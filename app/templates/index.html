<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>병원 모니터링 대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Malgun Gothic', sans-serif;
      background: #f4f6f9;
      color: #222;
      font-size: 14px;
    }

    /* ── 헤더 ── */
    header {
      background: #1a56db;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    header h1 { font-size: 17px; font-weight: 700; }
    header .meta { font-size: 12px; opacity: .8; }

    /* ── 통계 ── */
    .stats {
      display: flex;
      gap: 12px;
      padding: 16px 24px 0;
    }
    .stat-card {
      background: #fff;
      border-radius: 8px;
      padding: 14px 20px;
      min-width: 140px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .stat-card .label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .stat-card .value { font-size: 26px; font-weight: 700; color: #1a56db; }
    .stat-card.new .value { color: #e53e3e; }

    /* ── 검색바 ── */
    .search-bar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px 24px 0;
    }
    .search-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-input-box {
      display: flex;
      align-items: center;
      flex: 1;
      background: #fff;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      padding: 6px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .search-input-box:focus-within { border-color: #1a56db; }
    .search-input-box .input-icon {
      font-size: 14px;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .search-input-box input {
      border: none;
      outline: none;
      font-size: 13px;
      padding: 5px 0;
      background: transparent;
      flex: 1;
      min-width: 0;
    }
    .search-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .new-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      white-space: nowrap;
    }
    .new-label input { width: 15px; height: 15px; cursor: pointer; }

    /* ── 버튼 ── */
    .btn {
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity .15s;
      white-space: nowrap;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #1a56db; color: #fff; }
    .btn-green   { background: #38a169; color: #fff; }
    .btn-gray    { background: #e2e8f0; color: #444; }

    #collect-btn.loading { background: #93c5fd; cursor: not-allowed; }

    /* ── 플랫폼 탭 ── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 14px 24px 0;
      border-bottom: 1px solid #e5e7eb;
      margin: 0 0 0 0;
    }
    .tab {
      padding: 8px 18px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
      border-radius: 6px 6px 0 0;
      transition: color .15s;
    }
    .tab:hover { color: #1a56db; background: #f0f4ff; }
    .tab.active {
      color: #1a56db;
      border-bottom-color: #1a56db;
      background: #fff;
    }
    .tab .tab-count {
      display: inline-block;
      background: #e5e7eb;
      color: #555;
      border-radius: 10px;
      font-size: 11px;
      padding: 1px 6px;
      margin-left: 4px;
      font-weight: 500;
    }
    .tab.active .tab-count { background: #dbeafe; color: #1a56db; }

    /* ── 테이블 ── */
    .table-wrap {
      padding: 0 24px 32px;
      overflow-x: auto;
      background: #fff;
      margin: 0 24px 24px;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    table {
      width: 100%;
      min-width: 900px;
      table-layout: fixed;
      border-collapse: collapse;
      background: #fff;
    }
    thead th {
      background: #f8fafc;
      padding: 10px 12px;
      text-align: left;
      font-size: 12px;
      color: #555;
      border-bottom: 1px solid #e5e7eb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
      user-select: none;
    }
    thead th .col-resizer {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 5px;
      cursor: col-resize;
      background: transparent;
    }
    thead th .col-resizer:hover,
    thead th .col-resizer.dragging { background: #1a56db44; }

    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:hover { background: #f8fafc; }
    tbody tr.is-new { background: #fff8f0; }
    tbody tr.is-new:hover { background: #fff0e0; }
    tbody tr.is-neg { background: #fff5f5; }
    tbody tr.is-neg:hover { background: #ffe4e4; }
    td {
      padding: 10px 12px; vertical-align: top; line-height: 1.5;
      overflow: hidden;
    }
    td:nth-child(1), td:nth-child(2), td:nth-child(3), td:nth-child(4),
    td:nth-child(6), td:nth-child(7) {
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .title-cell { word-break: break-word; min-width: 0; }
    .title-cell a {
      color: #1a56db;
      text-decoration: none;
      font-weight: 600;
      word-break: break-word;
    }
    .title-cell a:hover { text-decoration: underline; }
    .desc { color: #555; font-size: 12px; margin-top: 3px; word-break: break-word; }
    .neg-sentence { color: #c53030; font-weight: 600; }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-new      { background: #fed7d7; color: #c53030; }
    .badge-neg      { background: #c53030; color: #fff; }
    .badge-neg-warn { background: #f6ad55; color: #7b341e; }
    .badge-cafe     { background: #bee3f8; color: #2b6cb0; }
    .badge-blog     { background: #c6f6d5; color: #276749; }
    .badge-place    { background: #e9d8fd; color: #6b46c1; }

    .keyword-tag {
      display: inline-block;
      background: #ede9fe;
      color: #5b21b6;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      margin-right: 4px;
    }

    .empty { text-align: center; padding: 60px; color: #aaa; }

    /* ── 로딩 오버레이 ── */
    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #overlay.show { display: flex; }
    .spinner-box {
      background: #fff;
      border-radius: 12px;
      padding: 32px 48px;
      text-align: center;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #1a56db;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-cancel {
      margin-top: 16px;
      padding: 8px 20px;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      color: #555;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-cancel:hover { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }

    /* toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1a56db; color: #fff;
      padding: 10px 18px; border-radius: 8px;
      font-size: 13px; opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>🏥 병원 부정글 모니터링</h1>
  <span class="meta" id="last-run-label">마지막 수집: -</span>
</header>

<!-- 통계 -->
<div class="stats">
  <div class="stat-card">
    <div class="label">전체 수집</div>
    <div class="value" id="stat-total">-</div>
  </div>
  <div class="stat-card new">
    <div class="label">신규 (미확인)</div>
    <div class="value" id="stat-new">-</div>
  </div>
</div>

<!-- 검색바 -->
<div class="search-bar">
  <!-- 1행: 통합 검색 + 수집하기 -->
  <div class="search-row">
    <div class="search-input-box">
      <span class="input-icon">🔍</span>
      <input id="search-query" placeholder="키워드 검색 (예: 리팅 / 부작용 / 코수술 / 환불)" oninput="loadArticles()">
    </div>
    <button class="btn btn-green" id="collect-btn" onclick="startCollect()">▶ 지금 수집하기</button>
  </div>
  <!-- 2행: 신규만 보기 + 전체 확인 처리 -->
  <div class="search-row">
    <label class="new-label">
      <input type="checkbox" id="filter-new" onchange="loadArticles()"> 신규만 보기
    </label>
    <button class="btn btn-gray" onclick="markSeen()">✔ 전체 확인 처리</button>
  </div>
</div>

<!-- 플랫폼 탭 -->
<div class="tabs" id="platform-tabs">
  <button class="tab active" data-source="" onclick="switchTab(this)">전체</button>
  <button class="tab" data-source="여우야" onclick="switchTab(this)">여우야</button>
  <button class="tab" data-source="성형위키" onclick="switchTab(this)">성형위키</button>
  <button class="tab" data-source="재잘재잘" onclick="switchTab(this)">재잘재잘</button>
  <button class="tab" data-source="가아사" onclick="switchTab(this)">가아사</button>
  <button class="tab" data-source="웨딩킹" onclick="switchTab(this)">웨딩킹</button>
</div>

<!-- 테이블 -->
<div class="table-wrap" style="margin-top:0; border-radius:0 0 10px 10px;">
  <table>
    <thead>
      <tr>
        <th style="width:135px">상태</th>
        <th style="width:130px">병원</th>
        <th style="width:90px">출처</th>
        <th style="width:120px">키워드</th>
        <th>제목 / 내용</th>
        <th style="width:100px">게시일</th>
        <th style="width:100px">수집일</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty-msg" style="display:none">수집된 데이터가 없습니다.</div>
</div>

<!-- 로딩 오버레이 -->
<div id="overlay">
  <div class="spinner-box">
    <div class="spinner"></div>
    <div style="font-size:14px;color:#555">수집 중입니다…<br><small style="color:#aaa">완료 후 자동으로 새로고침 됩니다</small></div>
    <button class="btn-cancel" onclick="cancelCollect()">✕ 취소</button>
  </div>
</div>

<div id="toast"></div>

<script>
  const PLATFORMS = ['여우야', '성형위키', '재잘재잘', '가아사', '웨딩킹'];
  let activeSource = '';
  let allArticles = [];

  const SOURCE_BADGE = {
    blog:  '<span class="badge badge-blog">블로그</span>',
    place: '<span class="badge badge-place">플레이스</span>',
  };
  function sourceBadge(source) {
    if (SOURCE_BADGE[source]) return SOURCE_BADGE[source];
    return `<span class="badge badge-cafe">${escHtml(source)}</span>`;
  }

  async function loadStats() {
    const r = await fetch('/api/stats').then(r => r.json());
    document.getElementById('stat-total').textContent = r.total;
    document.getElementById('stat-new').textContent = r.new;
    if (r.last_run) {
      document.getElementById('last-run-label').textContent =
        `마지막 수집: ${r.last_run.started_at} (신규 ${r.last_run.new_count}건)`;
    }
  }

  async function loadArticles() {
    const query   = document.getElementById('search-query').value.trim();
    const onlyNew = document.getElementById('filter-new').checked ? '1' : '';

    const params = new URLSearchParams();
    if (onlyNew) params.set('only_new', onlyNew);

    allArticles = await fetch('/api/articles?' + params).then(r => r.json());

    // 통합 검색: 병원명 · 키워드태그 · 제목 · 내용 전체에서 필터
    let filtered = allArticles;
    if (query) {
      const q = query.toLowerCase();
      filtered = filtered.filter(a =>
        (a.hospital     || '').toLowerCase().includes(q) ||
        (a.keyword      || '').toLowerCase().includes(q) ||
        (a.title        || '').toLowerCase().includes(q) ||
        (a.description  || '').toLowerCase().includes(q)
      );
    }

    updateTabCounts(filtered);
    renderTable(filtered.filter(a => !activeSource || a.source === activeSource));
  }

  function updateTabCounts(articles) {
    document.querySelectorAll('.tab').forEach(tab => {
      const src = tab.dataset.source;
      const count = src ? articles.filter(a => a.source === src).length : articles.length;
      let countEl = tab.querySelector('.tab-count');
      if (!countEl) {
        countEl = document.createElement('span');
        countEl.className = 'tab-count';
        tab.appendChild(countEl);
      }
      countEl.textContent = count;
    });
  }

  function switchTab(el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    activeSource = el.dataset.source;
    loadArticles();
  }

  const NEG_KEYWORDS = [
    '부작용','후유증','감염','의료사고','과실','합병증','흉터','켈로이드','비대칭',
    '환불','사기','고소','신고','소송','고발','경찰','법원',
    '실망','후회','최악','별로','망했','망해','불만','억울','화가',
    '항의','클레임','욕','욕설','개같','씨발','ㅅㅂ','ㅂㅅ',
    '거짓말','속았','사망','죽','위험','조심','주의','경고',
    '재수술','재시술','실패','잘못','틀렸','잘못됐','엉망',
    '돈낭비','바가지','비싸','돈만','시간낭비',
  ];

  function negScore(a) {
    const text = ((a.title || '') + ' ' + (a.description || '')).toLowerCase();
    return NEG_KEYWORDS.filter(kw => text.includes(kw)).length;
  }

  function sortedDesc(description) {
    if (!description) return '';
    const sentences = description.split(/(?<=[.?!。\n])\s*|(?<=다\.?\s)|(?<=요\.?\s)|(?<=죠\.?\s)/).filter(s => s.trim().length > 4);
    if (sentences.length <= 1) return escHtml(description);
    const scored = sentences.map(s => ({
      s,
      score: NEG_KEYWORDS.filter(kw => s.toLowerCase().includes(kw)).length
    }));
    scored.sort((a, b) => b.score - a.score);
    return scored.map(({ s, score }) =>
      score > 0
        ? `<span class="neg-sentence">${escHtml(s.trim())}</span>`
        : escHtml(s.trim())
    ).join(' ');
  }

  function renderTable(articles) {
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('empty-msg');

    if (!articles.length) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    const scored = articles.map(a => ({ ...a, _neg: negScore(a) }));
    scored.sort((a, b) => b._neg - a._neg);

    tbody.innerHTML = scored.map(a => {
      const isNew = a.is_new ? '<span class="badge badge-new">NEW</span>' : '확인됨';
      const negBadge = a._neg >= 3
        ? '<span class="badge badge-neg">부정</span>'
        : a._neg >= 1
          ? '<span class="badge badge-neg-warn">주의</span>'
          : '';
      const badge  = sourceBadge(a.source);
      const kwTag  = a.keyword ? `<span class="keyword-tag">${escHtml(a.keyword)}</span>` : '';
      const desc   = a.description ? `<div class="desc">${sortedDesc(a.description)}</div>` : '';
      const pub    = (a.published_at || '').slice(0, 10);
      const col    = (a.collected_at || '').slice(0, 10);

      return `<tr class="${a.is_new ? 'is-new' : ''}${a._neg >= 1 ? ' is-neg' : ''}">
        <td>${isNew}${negBadge}</td>
        <td>${escHtml(a.hospital)}</td>
        <td>${badge}</td>
        <td>${kwTag}</td>
        <td class="title-cell">
          <a href="${escHtml(a.link)}" target="_blank" rel="noopener" onclick="markOneSeen(${a.id}, this)">${escHtml(a.title)}</a>
          ${desc}
        </td>
        <td>${pub}</td>
        <td>${col}</td>
      </tr>`;
    }).join('');
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let collectPoll = null;

  function resetCollectBtn() {
    const btn = document.getElementById('collect-btn');
    btn.textContent = '▶ 지금 수집하기';
    btn.classList.remove('loading');
    btn.disabled = false;
    document.getElementById('overlay').classList.remove('show');
  }

  function cancelCollect() {
    if (collectPoll) { clearInterval(collectPoll); collectPoll = null; }
    resetCollectBtn();
    showToast('수집을 취소했습니다');
  }

  async function startCollect() {
    const btn = document.getElementById('collect-btn');
    btn.textContent = '수집 중…';
    btn.classList.add('loading');
    btn.disabled = true;
    document.getElementById('overlay').classList.add('show');

    await fetch('/api/collect', { method: 'POST' });

    const startLastRun = document.getElementById('last-run-label').textContent;
    let tries = 0;
    collectPoll = setInterval(async () => {
      tries++;
      await loadStats();
      const curLastRun = document.getElementById('last-run-label').textContent;
      if (curLastRun !== startLastRun || tries > 60) {
        clearInterval(collectPoll); collectPoll = null;
        resetCollectBtn();
        await loadArticles();
        showToast('수집 완료!');
      }
    }, 5000);
  }

  async function markOneSeen(id, el) {
    await fetch('/api/mark_seen', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id }),
    });
    const row = el.closest('tr');
    if (row) {
      row.classList.remove('is-new');
      const statusCell = row.querySelector('td:first-child');
      if (statusCell) {
        const newBadge = statusCell.querySelector('.badge-new');
        if (newBadge) newBadge.remove();
        if (!statusCell.textContent.includes('확인됨')) {
          statusCell.insertAdjacentText('afterbegin', '확인됨 ');
        }
      }
    }
    await loadStats();
  }

  async function markSeen() {
    await fetch('/api/mark_seen', { method: 'POST' });
    await loadStats();
    await loadArticles();
    showToast('전체 확인 처리 완료');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // 초기 로드
  (async () => {
    await loadStats();
    await loadArticles();
    initColResize();
  })();

  // ── 컬럼 리사이즈 ──────────────────────────────────────
  function initColResize() {
    const ths = document.querySelectorAll('thead th');
    ths.forEach(th => {
      const handle = document.createElement('div');
      handle.className = 'col-resizer';
      th.appendChild(handle);

      let startX, startW;
      handle.addEventListener('mousedown', e => {
        startX = e.pageX;
        startW = th.offsetWidth;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';

        const onMove = e => {
          const w = Math.max(40, startW + (e.pageX - startX));
          th.style.width = w + 'px';
        };
        const onUp = () => {
          handle.classList.remove('dragging');
          document.body.style.cursor = '';
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        e.preventDefault();
      });
    });
  }
</script>
</body>
</html>
